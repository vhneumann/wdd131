<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>

<main>
    <div class="hero">
        <picture>
            <source media="(min-width: 1000px)" srcset="images/hero-large.webp">
            <source media="(min-width: 500px)" srcset="images/hero-medium.webp">
            <img src="images/hero-small.webp" alt="Columbus Ohio Temple in autumn." width="1500" height="750">
        </picture>
    </div>
</main>
    
</body>
</html>
