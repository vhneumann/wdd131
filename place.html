<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Country</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/place.css">
        <script src="scripts/place.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Argentina</h1>
            <p> </p>
        </header>
        <main>
            <picture>
                <img class="hero" src="images/hero-large.webp" alt="Cathedral of Bariloche">
                    <!-- <scrcset></scrcset> -->
                </img>
            </picture>

            <section>
                <h2>Data</h2>
                <ul>
                    <li id="area"></li>
                    <li id="population"></li>
                    <li id="capital"></li>
                    <li id="languages"></li>
                    <li id="currency"></li>
                    <li id="timezone"></li>
                    <li id="callingcode"></li>
                    <li id="internettld"></li>
                </ul>
            </section>

            <section>
                <picture>
                    <img src="" alt="">
                        <srcset></srcset>
                    </img>
                </picture>
                <h2>Weather</h2>
                <ul>
                    <li id="temperature"></li>
                    <li id="conditions"></li>
                    <li id="wind"></li>
                    <li id="windchill"></li>
                </ul>
            </section>
        </main>
        <footer>
            <p>&copy;<span id="currentYear"></span> - Víctor H. Neumann - Salta, Argentina</p>
            <p >Last Modification: <span id="last-modified-date"></span></p>
        </footer>
    </body>
</html>
